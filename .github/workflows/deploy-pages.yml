name: Deploy RelocateBoard

on:
  push:
    branches:
      - main
  schedule:
    - cron: "30 3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download previous job feed
        if: github.event_name == 'schedule'
        run: curl -fsSL "https://arpan1605.github.io/RelocateBroad/jobs.json" -o previous-jobs.json || true

      - name: Fetch live job data
        run: pnpm run fetch:jobs

      - name: Send daily email digest
        if: github.event_name == 'schedule'
        run: pnpm run send:digest -- apps/web/public/jobs.json previous-jobs.json
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}

      - name: Build Angular app
        run: pnpm run build:pages

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist/relocateboard/browser

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
